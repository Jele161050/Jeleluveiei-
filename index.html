<style>
:root {
    --bg: #FFF0F6;
    --main: #FF85B8;
    --dark: #D63384;
    --white: #FFFFFF;
    --glow: rgba(255, 133, 184, 0.6);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Mitr',sans-serif;}
body{background:var(--bg);display:flex;justify-content:center;}
.container{max-width:500px;width:100%;padding:20px 15px 40px;}
.section{
    background:var(--white);
    border-radius:20px;
    padding:25px 20px;
    margin-bottom:20px;
    box-shadow:0 0 15px var(--glow);
    border:2px solid var(--main);
}
h1,h2,h3{color:var(--dark);}
.center{text-align:center;}
.logo{
    width:150px;height:150px;
    border-radius:50%;
    overflow:hidden;
    margin:0 auto 20px;
    box-shadow:0 0 20px var(--glow);
    border: 3px solid #fff;
}
.logo img{width:100%;height:100%;object-fit:cover;}
.badges{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}
.badge{
    background:#fff;
    padding:8px 16px;
    border-radius:25px;
    box-shadow:0 0 10px var(--glow);
    font-size:13px;
    color:var(--dark);
    border: 1px solid var(--main);
}
.btn{
    display:block;
    text-align:center;
    padding:14px;
    border-radius:25px;
    text-decoration:none;
    margin-top:15px;
    font-weight:500;
}
.btn-outline{
    background:#fff;
    border:2px dashed var(--main);
    color:var(--dark);
}
.btn-main{
    background:var(--main);
    color:#fff;
    box-shadow: 0 4px 10px var(--glow);
}
.step{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.step-num{
    background:var(--main);
    color:#fff;
    width:26px;height:26px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
}
.price-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    background:#fffcfd;
    padding:10px 15px;
    border-radius:15px;
}
.price-tag{
    background:var(--main);
    color:#fff;
    padding:3px 12px;
    border-radius:20px;
    font-size:14px;
}
.footer{text-align:center;margin-top:30px;}
.socials{display:flex;gap:8px;justify-content:center;margin-top:15px;}
.socials a{
    flex:1;
    max-width:100px;
    text-align:center;
    padding:8px;
    border-radius:25px;
    background:#fff;
    text-decoration:none;
    color:var(--dark);
    font-size:13px;
    border:1px solid var(--main);
}
.small{font-size:12px;opacity:.7;margin-top:10px;}
</style>
